name: Scrape NCERT Textbooks

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ncert-content  # Use a dedicated content branch if needed, or main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install requests beautifulsoup4 tqdm pypdf2

      - name: Scrape NCERT
        run: python scripts/scrape_ncert.py

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add content/ structure.json
          git commit -m "chore: update NCERT books $(date +%Y-%m-%d)" || echo "No changes"
          git push
    